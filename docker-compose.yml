version: '3.8'

services:
  # Database
  db:
    image: postgres:15
    container_name: codepulse-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: codepulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # n8n Automation Engine
  n8n:
    image: n8nio/n8n
    container_name: codepulse-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8ndata:/home/node/.n8n

  # Backend (FastAPI)
  backend:
    build: ./backend
    container_name: codepulse-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/codepulse
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/start-analysis
    depends_on:
      - db
      - n8n
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Vite)
  frontend:
    build: .
    container_name: codepulse-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000/api
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  pgdata:
  n8ndata:
